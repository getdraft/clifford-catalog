schemaVersion: "1.0"
workspace:
  name: clifford-catalog
  displayName: Clifford DRAFT Catalog
  companyName: Clifford

repository:
  provider: github
  owner: getdraft
  name: clifford-catalog
  defaultBranch: main

framework:
  source: https://github.com/getdraft/draftsman.git
  vendoredPath: .draft/framework
  updatePolicy: explicit
  updateWorkflow: enabled

paths:
  catalog: catalog
  configurations: configurations

requirements:
  activeRequirementGroups:
    - SFSE49JDWK-FKPD  # Security & Access Controls
    - 6T3RS5BZGK-ZD6Z  # Data Residency & Classification
    - TXKTEP0GVA-00VQ  # SLA & Availability Tiers
    - Y53Z3HXWX6-11KR  # Change Management & Deployment Gates
    - BVQAD2CJKY-C45E  # Vulnerability Management
  requireActiveRequirementGroupDisposition: false

contribution:
  branchingStrategy: github-flow

# Optional company vocabulary lists. Declare lists gradually. Use advisory while
# onboarding and gated when the company wants validation to block non-standard values.
vocabulary: {}
