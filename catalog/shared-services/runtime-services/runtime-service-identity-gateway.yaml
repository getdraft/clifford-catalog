type: runtime_service
name: Clifford Identity Gateway
description: |
  Self-managed Node.js identity broker that fronts authentication for every Clifford product. Internal staff and customer district administrators authenticate via Okta Workforce Identity (SAML/OIDC); district teachers and substitute staff authenticate via roster-linked single sign-on through Clever and ClassLink, the two dominant K-12 rostering/SSO standards. The gateway issues a normalized Clifford session token consumed by all five product SDPs so no product team integrates directly with a district SSO provider.
