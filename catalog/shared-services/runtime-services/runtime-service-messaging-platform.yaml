notes:
  scalabilityModel: EventBridge scales automatically; per-consumer SQS queues are the practical throughput bottleneck and are sized per product team.
  failureDomain: Event delivery delay during an EventBridge regional degradation is the most common cross-team incident category reported in the (simulated) Clifford incident log.
  catalogStatusReason: Marked incomplete because the per-product schema registry conventions are still informally documented in a wiki rather than declared as DRAFT configuration objects - flagged as a follow-up rather than resolved during this exercise.
