type: runtime_service
name: Clifford Event Bus
description: Shared Amazon EventBridge bus plus per-consumer SQS queues used for asynchronous cross-product events - e.g., TimePay publishing an approved-timesheet event that Talent's payroll-eligibility check and People's HR record both subscribe to. Each product team owns its own event schemas and queue consumers; platform-engineering owns the bus, dead-letter-queue policy, and schema registry conventions.
