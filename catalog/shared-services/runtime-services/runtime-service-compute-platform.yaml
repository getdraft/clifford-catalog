type: runtime_service
name: Clifford Compute Platform
description: |
  Shared Amazon ECS Fargate cluster that hosts every product's containerized
  API and worker services (Coverage, TimePay, Talent, People APIs; the
  Identity Gateway; the Talent background-check Celery worker). Surfaced
  late in this exercise: the Phase 2 inferred shared-services list
  (identity, observability, data platform, messaging, CI/CD, secrets,
  API gateway) did not originally include a generic compute/container
  substrate, and the gap only became visible once Phase 5 needed a
  concrete RuntimeService UID for each SDP's serviceGroup.substrate field.
  Logged as a friction point: SDP construction is itself an effective way
  to surface missing shared-services inventory that a Phase-2-style
  up-front brainstorm can miss.
