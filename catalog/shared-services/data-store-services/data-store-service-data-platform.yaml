type: data_store_service
name: Clifford Data Platform
description: Shared Amazon Aurora PostgreSQL cluster providing the primary OLTP data store for all four product lines. Each product owns a dedicated logical database (coverage, timepay, talent, people) on the shared cluster, with IAM-scoped credentials per product and no cross-database joins permitted - cross-product reporting goes through the analytics warehouse instead, not direct database access.
