vendorGovernance:
  dataLeavesInfrastructure: false
  dataResidencyCommitment: US-only - cluster pinned to us-east-1 with a us-east-2 standby region for disaster recovery; no cross-region replication outside the US
  vendorSLA: 99.99% per AWS Aurora SLA for Multi-AZ deployments
  incidentNotificationProcess: AWS Health Dashboard plus AWS Business Support case escalation
notes:
  encryptionAtRest: KMS customer-managed key, automatic Aurora storage encryption.
  recoverabilityModel: Automated snapshots every 6 hours, continuous backup via Aurora's underlying storage layer, point-in-time restore available for the prior 35 days.
  scalabilityModel: Aurora read replicas added per product as read traffic grows; People (core HR) is the largest logical database by row count.
  failureDomain: A cluster-wide outage affects all four product databases simultaneously, since they share one Aurora cluster - the exercise's Admin agent flagged this as a concentration risk worth a future per-product-line cluster split, logged as a friction/recommendation item rather than resolved here.
