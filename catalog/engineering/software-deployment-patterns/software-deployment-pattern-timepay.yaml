scalingUnits:
- name: timepay-api
  type: replicable
  instanceCount: 2
notes:
  availabilityTarget: 99.5%
  failureDomain:
    scope: service-group
    description: TimePay outages are isolated to its own service group except for shared Compute Platform
      and Data Platform cluster-wide failures.
  teamObjection: The TimePay team's reviewer (skeptical disposition) pushed back on declaring the nightly
    payroll-export batch task as part of the same serviceGroup as the API service, arguing a scheduled
    batch job has a fundamentally different deployment and scaling profile (one-shot task vs. long-running
    service) and the schema gives no first-class way to distinguish them within serviceGroups/scalingUnits
    - both are typed generically as deployable objects with a replicable/shared scaling unit, with no
    "scheduled task" or "batch job" concept. The admin agreed this is a real gap and chose to model the
    batch task only at the product_component and data_component level (data_component.scheduledJobs) rather
    than inventing an unsupported SDP-level construct, logged as a friction point rather than worked around
    with a non-standard field.
