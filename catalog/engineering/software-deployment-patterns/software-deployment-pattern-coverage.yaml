schemaVersion: '1.0'
uid: M8255Y9CNY-HXXJ
type: software_deployment_pattern
name: Coverage Deployment Pattern
description: Deployment pattern for the Coverage absence and substitute-management product - a single
  containerized NestJS API service plus a BullMQ/Redis-backed matching-job queue, deployed behind the
  shared Clifford API Gateway and Identity Gateway.
version: 1.0.0
catalogStatus: complete
lifecycleStatus: preferred
owner:
  team: coverage
  contact: coverage-team@clifford.example
tags:
- coverage
- absence-management
businessContext:
  pillar: engineering
  productFamily: Coverage
  ownerNode: coverage
  notes: One of Clifford's four district-facing product lines; Critical availability tier because substitute
    matching runs during live school-day absence reporting windows.
networkZones:
- id: edge
  name: Public Edge
  tier: frontend
  description: Shared API Gateway + WAF edge that all Coverage traffic passes through before reaching
    the application zone.
- id: app
  name: Application Zone
  tier: application
  description: Coverage API service and matching-job worker process.
- id: data
  name: Data Zone
  tier: data
  description: Coverage logical database on the shared Aurora cluster, plus the Redis matching-job queue.
