scalingUnits:
- name: coverage-api
  type: replicable
  instanceCount: 3
  notes: Scales up automatically during early-morning absence-reporting peak (5:30-7:00am district-local
    time).
notes:
  availabilityTarget: 99.9%
  failureDomain:
    scope: service-group
    description: A Coverage-specific outage is isolated to the coverage-api service group; it does not
      affect TimePay, Talent, or People, though it shares fate with the underlying Compute Platform and
      Data Platform cluster-wide outages.
