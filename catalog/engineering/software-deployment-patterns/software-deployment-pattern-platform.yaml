notes:
  availabilityTarget: 99.0%
  failureDomain:
    scope: service-group
    description: A portal outage affects only internal engineering self-service workflows; it has no path
      to district-facing downtime since the shared Terraform module itself is consumed at build time,
      not runtime.
  teamObjection: 'The Platform team''s reviewer (skeptical disposition) objected to being asked to produce
    a software_deployment_pattern at all, on the grounds that the team''s primary output (the shared ECS
    Terraform module and platform conventions other teams build on) has no independent runtime footprint
    - it is consumed at build/infra-provisioning time by every other team''s own SDP, not deployed as
    a running service of its own, so forcing it into networkZones/serviceGroups/deployableObjects produces
    an SDP that describes almost none of the team''s actual engineering surface area. The admin agreed
    this is a legitimate gap rather than something to argue around: DRAFT''s SDP concept models deployed
    runtime topology well, but has no object type for "library/module consumed by other SDPs at build
    time," so that side of the Platform team''s work is invisible to the catalog entirely. Resolved by
    scoping this SDP to only the one artifact that is genuinely deployed (the developer portal) and logging
    the missing build-time-dependency concept as a friction point rather than inventing an unsupported
    field.'
