type: software_deployment_pattern
name: Platform Deployment Pattern
description: Deployment pattern for the Clifford Platform team. Most of this team's output is the shared
  Terraform ECS service module and infra conventions consumed by the other four product teams, which has
  no independent runtime and is not represented below; the only independently-deployed artifact is the
  internal developer portal (module usage guide, service catalog UI) that the module-usage-guide.md in
  the product repo documents.
