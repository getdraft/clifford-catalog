notes:
  availabilityTarget: 99.0%
  failureDomain:
    scope: service-group
    description: Talent outages are isolated to its own service group except for shared Compute Platform
      and Data Platform cluster-wide failures.
  teamQuestions: 'The Talent team''s reviewer (informed disposition, having read the vendor docs) asked
    three questions before contributing: (1) does the background-check-data-handling requirement''s "restricted"
    applicability match correctly resolve against this SDP, given the requirement is declared on the RequirementGroup
    with applicability.field: dataClassification, but the SDP itself has no single dataClassification
    field - only the underlying data_component does; (2) should the public careers site''s unauthenticated
    interface be modeled as a separate networkZone with no tier, given it doesn''t cleanly match frontend/
    application/data; and (3) whether naAllowed:true on a background-check requirement is appropriate
    at all, given background checks are mandatory for every K-12 hire. The admin resolved (1) by noting
    the requirement''s applicability is evaluated against the data_component it''s actually answered on
    (talent-database, classification restricted), not the SDP - a real ambiguity in how applicability
    composes across object types, kept on the data_component rather than duplicated here; resolved (2)
    by keeping the public-careers zone tagged frontend since it is the internet-facing zone even though
    it carries no authentication; left (3) as a valid open question carried to Recommended Changes.'
